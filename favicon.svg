<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <defs>
    <!-- Gradient marki ze strony -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- Tło: bg-[#fdfbf7] i zaokrąglona ramka z bezpiecznym marginesem -->
  <rect width="32" height="32" rx="8" fill="#fdfbf7" />
  <rect width="29" height="29" x="1.5" y="1.5" rx="6.5" fill="none" stroke="url(#brand-grad)" stroke-width="1.5" />

  <!-- SEKCJA LITER (Opływowe, zaokrąglone, z zachowaniem proporcji) -->
  <g stroke-linecap="round" stroke-linejoin="round">
    
    <!-- 1. DUŻE M (Indygo) -->
    <path d="M 6.5 22.5 L 6.5 9 L 13.5 15.5 L 20.5 9 L 20.5 22.5" 
          stroke="#4f46e5" stroke-width="3.8" fill="none" />
    
    <!-- 2. SUBTELNY SEPARATOR (Bardzo wąskie tło tworzące delikatne odcięcie dla L) -->
    <path d="M 16.5 14.5 L 16.5 22.5 L 24 22.5" 
          stroke="#fdfbf7" stroke-width="5.2" fill="none" />
          
    <!-- 3. MNIEJSZE L (Bursztyn - zaokrąglone i odsunięte od krawędzi ramki) -->
    <path d="M 16.5 14.5 L 16.5 22.5 L 24 22.5" 
          stroke="#d97706" stroke-width="3.8" fill="none" />
          
  </g>
</svg>
